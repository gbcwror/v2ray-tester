name: Test v2ray Configs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

env:
  CONFIGS_PER_FILE: 500
  TEST_TIMEOUT: 5
  CONCURRENT_TESTS: 300
  TEST_URL: "http://gstatic.com/generate_204"
  REPO_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Check subscription file
        id: check
        run: |
          if [ ! -s subscription.txt ] || ! grep -qv '^\s*#' subscription.txt; then
            echo "subscription.txt has no active URLs. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Download dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          go get github.com/xtls/xray-core@latest
          go mod tidy

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: go build -o tester ./cmd/tester

      - name: Run tester
        if: steps.check.outputs.skip != 'true'
        run: |
          ./tester \
            --subscriptions subscription.txt \
            --test-url "$TEST_URL" \
            --timeout "$TEST_TIMEOUT" \
            --concurrent "$CONCURRENT_TESTS" \
            --per-file "$CONFIGS_PER_FILE" \
            --repo-url "$REPO_URL" \
            --output-dir protocols

      - name: Commit results
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md protocols/ go.mod go.sum 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update configs $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi